<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Продукція</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="nav-placeholder"></div>

<section id="products">
  <h2>Продукція</h2>
  <div class="product-grid">
    <div class="product-card" 
         data-title="Молоко пастеризоване" 
         data-desc="Натуральне коров’яче молоко без домішок." 
         data-details="Наше молоко проходить пастеризацію для збереження корисних властивостей."
         data-img="milk.png">
      <img src="milk.png" alt="Молоко">
      <h3>Молоко пастеризоване</h3>
      <p>Натуральне коров’яче молоко без домішок.</p>
      <button class="product-btn">Детальніше</button>
    </div>

    <div class="product-card" 
         data-title="Кефір" 
         data-desc="Корисний кисломолочний продукт, багатий на пробіотики." 
         data-details="Наш кефір виготовляється з натурального молока та закваски."
         data-img="kefir.jpg">
      <img src="kefir.jpg" alt="Кефір">
      <h3>Кефір</h3>
      <p>Корисний кисломолочний продукт, багатий на пробіотики.</p>
      <button class="product-btn">Детальніше</button>
    </div>

    <div class="product-card" 
         data-title="Сир кисломолочний" 
         data-desc="Свіжий домашній сир з ніжною текстурою." 
         data-details="Сир виготовляється шляхом ферментації молока з використанням заквасок."
         data-img="cheese.jpg">
      <img src="cheese.jpg" alt="Сир">
      <h3>Сир кисломолочний</h3>
      <p>Свіжий домашній сир з ніжною текстурою.</p>
      <button class="product-btn">Детальніше</button>
    </div>
  </div>
</section>

<!-- Одна універсальна модалка -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <img id="modalImg" src="" alt="">
    <h2 id="modalTitle"></h2>
    <p id="modalDetails"></p>
  </div>
</div>

  <div id="footer-placeholder"></div>

</section>

  <script src="script.js"></script>
    <script src="script3.js"></script>
</body>
</html>
